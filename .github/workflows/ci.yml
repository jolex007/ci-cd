name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4
      
      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Перейти в папку с проектом
        run: cd python-app

      - name: Уставновить зависимости
        run: pip install -r requirements.txt

      - name: Запустить тесты
        run: pytest test_calculator.py
